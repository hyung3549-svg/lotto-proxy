name: Update Lotto Data
on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml -q
      - name: Fetch latest lotto rounds
        run: python3 scripts/crawl.py
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add lotto.json
          git diff --staged --quiet || git commit -m "chore: auto-update lotto data"
          git push
