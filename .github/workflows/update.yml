name: Update Lotto Data

on:
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest lotto rounds
        run: |
          pip install requests -q
          python3 << 'EOF'
          import json, requests, urllib.parse

          with open('lotto.json', 'r') as f:
              data = json.load(f)

          latest = max(d['round'] for d in data)
          new_rounds = []

          for r in range(latest + 1, latest + 10):
              target = f'https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={r}'
              proxy_url = f'https://api.allorigins.win/get?url={urllib.parse.quote(target)}'
              try:
                  resp = requests.get(proxy_url, timeout=20)
                  content = resp.json().get('contents', '').strip()
                  if not content.startswith('{'):
                      print(f'ℹ️ {r}회차: 아직 발표 안 됨')
                      break
                  d = json.loads(content)
                  if d.get('returnValue') != 'success':
                      print(f'ℹ️ {r}회차: 없음')
                      break
                  new_rounds.append({
                      'round': d['drwNo'],
                      'date': d['drwNoDate'],
                      'nums': sorted([d['drwtNo1'],d['drwtNo2'],d['drwtNo3'],d['drwtNo4'],d['drwtNo5'],d['drwtNo6']]),
                      'bonus': d['bnusNo'],
                      'prize1': d['firstWinamnt'],
                      'prize1Cnt': d['firstPrzwnerCo'],
                  })
                  print(f'✅ {r}회차 추가')
              except Exception as e:
                  print(f'❌ {r}회차 실패: {e}')
                  break

          if new_rounds:
              data = new_rounds + data
              with open('lotto.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False)
              print(f'{len(new_rounds)}개 업데이트 완료')
          else:
              print('새 회차 없음')
          EOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add lotto.json
          git diff --staged --quiet || git commit -m "chore: auto-update lotto data"
          git push
