name: Update Lotto Data

on:
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest lotto rounds
        run: |
          pip install requests -q
          python3 << 'EOF'
          import json, requests

          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept-Language': 'ko,en-US;q=0.9,en;q=0.8',
              'Origin': 'https://www.dhlottery.co.kr',
              'Referer': 'https://www.dhlottery.co.kr/',
              'Connection': 'keep-alive',
          })

          # 메인페이지 방문해서 WMONID 쿠키 획득
          print('세션 초기화 중...')
          session.get('https://www.dhlottery.co.kr/common.do?method=main', timeout=15)
          print(f'쿠키: {dict(session.cookies)}')

          with open('lotto.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          latest = max(d['round'] for d in data)
          new_rounds = []

          for r in range(latest + 1, latest + 10):
              try:
                  resp = session.get(
                      f'https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={r}',
                      timeout=15
                  )
                  content = resp.text.strip()
                  print(f'{r}회차 응답: {content[:80]}')
                  if not content.startswith('{'):
                      break
                  d = resp.json()
                  if d.get('returnValue') != 'success':
                      print(f'ℹ️ {r}회차 없음')
                      break
                  new_rounds.append({
                      'round': d['drwNo'], 'date': d['drwNoDate'],
                      'nums': sorted([d['drwtNo1'],d['drwtNo2'],d['drwtNo3'],d['drwtNo4'],d['drwtNo5'],d['drwtNo6']]),
                      'bonus': d['bnusNo'], 'prize1': d['firstWinamnt'], 'prize1Cnt': d['firstPrzwnerCo'],
                  })
                  print(f'✅ {r}회차 추가')
              except Exception as e:
                  print(f'❌ {r}회차 실패: {e}')
                  break

          if new_rounds:
              data = new_rounds + data
              with open('lotto.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False)
              print(f'{len(new_rounds)}개 업데이트 완료')
          else:
              print('새 회차 없음')
          EOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add lotto.json
          git diff --staged --quiet || git commit -m "chore: auto-update lotto data"
          git push
