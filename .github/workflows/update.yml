name: Update Lotto Data
on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest lotto rounds
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.error, json, re, time, os

          def fetch_round(rnd):
              url = f"https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={rnd}"
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "Accept": "application/json, text/javascript, */*; q=0.01",
                  "Referer": "https://www.dhlottery.co.kr/gameResult.do?method=byWin",
                  "X-Requested-With": "XMLHttpRequest",
              })
              try:
                  res = urllib.request.urlopen(req, timeout=15)
                  d = json.loads(res.read().decode("utf-8"))
                  if d.get("returnValue") != "success":
                      return None
                  return {
                      "round": d["drwNo"], "date": d["drwNoDate"],
                      "nums": sorted([d["drwtNo1"],d["drwtNo2"],d["drwtNo3"],
                                      d["drwtNo4"],d["drwtNo5"],d["drwtNo6"]]),
                      "bonus": d["bnusNo"],
                      "prize1": d.get("firstWinamnt", 0),
                      "prize1Cnt": d.get("firstPrzwnerCo", 0),
                  }
              except Exception as e:
                  print(f"  {rnd}회 오류: {e}")
                  return None

          def get_latest_round():
              req = urllib.request.Request(
                  "https://www.dhlottery.co.kr/common.do?method=main",
                  headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
              )
              try:
                  html = urllib.request.urlopen(req, timeout=15).read().decode("utf-8", errors="ignore")
                  m = re.search(r'<strong id="lottoDrwNo">(\d+)</strong>', html)
                  if m:
                      return int(m.group(1))
              except Exception as e:
                  print(f"최신 회차 조회 실패: {e}")
              return None

          with open("lotto.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          latest_existing = max(d["round"] for d in data)
          print(f"기존 최신: {latest_existing}회")

          # 최대 30분 재시도
          latest_round = None
          for attempt in range(1, 31):
              latest_round = get_latest_round()
              if latest_round and latest_round > latest_existing:
                  print(f"새 회차 발견: {latest_round}회!")
                  break
              print(f"시도 {attempt}/30 - 최신:{latest_round}, 1분 대기...")
              if attempt < 30:
                  time.sleep(60)

          if not latest_round or latest_round <= latest_existing:
              print("새 데이터 없음. 종료.")
              exit(0)

          new_rounds = []
          for rnd in range(latest_existing + 1, latest_round + 1):
              print(f"{rnd}회차 수집 중...")
              result = fetch_round(rnd)
              if result:
                  new_rounds.append(result)
                  print(f"✅ {rnd}회 {result['date']} {result['nums']}")
              else:
                  print(f"❌ {rnd}회 실패")
              time.sleep(2)

          if new_rounds:
              data = new_rounds + data
              with open("lotto.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"✅ {len(new_rounds)}회차 추가 완료!")
          else:
              print("새 데이터 수집 실패.")
          EOF
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add lotto.json
          git diff --staged --quiet || git commit -m "chore: auto-update lotto data"
          git push